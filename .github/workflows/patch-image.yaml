name: patch-image

on:
  workflow_dispatch:
    inputs:
      source-image:
        description: 'Full source image reference to patch (e.g. ghcr.io/fluxcd/source-watcher:v2.1.1)'
        required: true
        default: 'ghcr.io/fluxcd/source-watcher:v2.1.1'

permissions:
  contents: read

jobs:
  patch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      # Split "registry/org/name:tag" into the parts used by later steps.
      - name: Parse image reference
        id: img
        run: |
          SOURCE="${{ inputs.source-image }}"
          if [[ "$SOURCE" == *":"* ]]; then
            TAG="${SOURCE##*:}"
            REPO="${SOURCE%:*}"
          else
            TAG="latest"
            REPO="$SOURCE"
          fi
          IMAGE_NAME="$(basename "$REPO")"
          {
            echo "source=$SOURCE"
            echo "tag=$TAG"
            echo "image-name=$IMAGE_NAME"
            echo "mirror=ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${TAG}"
            echo "target=ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${TAG}-patched"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Copa derives the output registry from the source image reference, so
      # we mirror the upstream image into our own GHCR namespace first.  This
      # gives copa a registry it can both read from and write back to, and
      # avoids the localhost:port parsing bug in copa-action.
      - name: Mirror source image into our GHCR namespace
        run: |
          docker pull ${{ steps.img.outputs.source }}
          docker tag  ${{ steps.img.outputs.source }} ${{ steps.img.outputs.mirror }}
          docker push ${{ steps.img.outputs.mirror }}

      - name: Scan with Trivy (generate copa input report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.mirror }}
          format: json
          output: trivy-report.json
          vuln-type: os
          ignore-unfixed: false

      # Copa reads the Trivy report and upgrades only the affected OS packages.
      # It exports the result to the local docker daemon (not pushed yet).
      - name: Patch image with copa
        uses: project-copacetic/copa-action@v1.2.1
        with:
          image: ${{ steps.img.outputs.mirror }}
          image-report: trivy-report.json
          patched-tag: ${{ steps.img.outputs.tag }}-patched
          timeout: 5m

      - name: Push patched image to GHCR
        run: docker push ${{ steps.img.outputs.target }}

      # Fail the workflow if any fixable CRITICAL/HIGH OS CVE is still present.
      - name: Verify - scan patched image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.target }}
          format: table
          exit-code: '1'
          vuln-type: os
          severity: CRITICAL,HIGH
          ignore-unfixed: true
