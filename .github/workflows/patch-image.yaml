name: patch-image

on:
  workflow_dispatch:
    inputs:
      source-image:
        description: 'Full source image reference (e.g. ghcr.io/fluxcd/source-watcher:v2.1.1)'
        required: true
        default: 'ghcr.io/fluxcd/source-watcher:v2.1.1'
      patch-mode:
        description: '"os" patches OS packages only; "extreme" also patches app-level dependencies (Python/Node/Go) via copa experimental features'
        required: true
        default: 'os'
        type: choice
        options:
          - os
          - extreme

permissions:
  contents: read

jobs:
  patch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      # Split "registry/org/name:tag" into the parts used by later steps.
      - name: Parse image reference
        id: img
        run: |
          SOURCE="${{ inputs.source-image }}"
          if [[ "$SOURCE" == *":"* ]]; then
            TAG="${SOURCE##*:}"
            REPO="${SOURCE%:*}"
          else
            TAG="latest"
            REPO="$SOURCE"
          fi
          IMAGE_NAME="$(basename "$REPO")"
          MODE="${{ inputs.patch-mode }}"
          {
            echo "source=$SOURCE"
            echo "tag=$TAG"
            echo "image-name=$IMAGE_NAME"
            echo "mirror=ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${TAG}"
            echo "target=ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${TAG}-patched-${MODE}"
            # Trivy must scan os,library in extreme mode to produce the report copa needs.
            echo "vuln-type=$( [[ "$MODE" == "extreme" ]] && echo 'os,library' || echo 'os' )"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Copa derives the output registry from the source image reference, so we
      # mirror the upstream image into our own GHCR namespace first. This gives
      # copa a registry it can both read from and write back to.
      - name: Mirror source image into our GHCR namespace
        run: |
          docker pull ${{ steps.img.outputs.source }}
          docker tag  ${{ steps.img.outputs.source }} ${{ steps.img.outputs.mirror }}
          docker push ${{ steps.img.outputs.mirror }}

      - name: Scan with Trivy (generate copa input report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.mirror }}
          format: json
          output: trivy-report.json
          vuln-type: ${{ steps.img.outputs.vuln-type }}
          ignore-unfixed: false

      # ── OS mode ─────────────────────────────────────────────────────────────
      # Copa-action handles buildkitd setup internally.
      - name: Patch OS packages with copa (os mode)
        if: inputs.patch-mode == 'os'
        uses: project-copacetic/copa-action@v1.2.1
        with:
          image: ${{ steps.img.outputs.mirror }}
          image-report: trivy-report.json
          patched-tag: ${{ steps.img.outputs.tag }}-patched-os
          timeout: 5m

      # ── Extreme mode ─────────────────────────────────────────────────────────
      # Copa's app-level patching is experimental and requires flags that
      # copa-action does not expose, so we install the binary and run it directly.
      - name: Setup Docker Buildx (extreme mode)
        if: inputs.patch-mode == 'extreme'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: docker-container
          driver-opts: network=host

      - name: Install copa v0.14.1 (extreme mode)
        if: inputs.patch-mode == 'extreme'
        run: |
          curl -fsSL https://github.com/project-copacetic/copacetic/releases/download/v0.14.1/copa_0.14.1_linux_amd64.tar.gz \
            | tar xzf - copa
          sudo mv copa /usr/local/bin/copa
          copa --version

      - name: Patch OS + app-level packages with copa (extreme mode)
        if: inputs.patch-mode == 'extreme'
        env:
          COPA_EXPERIMENTAL: "1"
        run: |
          copa patch \
            --image      ${{ steps.img.outputs.mirror }} \
            --report     trivy-report.json \
            --tag        ${{ steps.img.outputs.tag }}-patched-extreme \
            --pkg-types  os,library \
            --library-patch-level patch \
            --addr       buildx://$(docker buildx ls --format '{{.Name}}' | head -1) \
            --timeout    10m

      # ── Shared ───────────────────────────────────────────────────────────────
      - name: Push patched image to GHCR
        run: docker push ${{ steps.img.outputs.target }}

      # Verify OS packages are clean. We always use vuln-type:os here because
      # copa cannot patch pre-compiled Go/Java binaries — those CVEs require
      # rebuilding from source and are out of scope for image-level patching.
      - name: Verify - scan patched image (OS packages)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.target }}
          format: table
          exit-code: '1'
          vuln-type: os
          severity: CRITICAL,HIGH
          ignore-unfixed: true
